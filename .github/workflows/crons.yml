name: Scheduled Crons

on:
  schedule:
    - cron: '0 12 * * *'    # Daily at noon UTC
    - cron: '0 14 * * 1'    # Mondays at 2pm UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  nfl-week:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 12 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Update NFL week
        run: |
          curl -s -X GET "https://gfl-alpha.vercel.app/api/cron/nfl-week" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            | cat

  cuts-alert:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 12 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Send cuts alert
        run: |
          curl -s -X GET "https://gfl-alpha.vercel.app/api/cron/cuts-alert" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            | cat

  schedule-reminder:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 14 * * 1' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Send schedule reminder
        run: |
          curl -s -X GET "https://gfl-alpha.vercel.app/api/cron/schedule-reminder" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            | cat
