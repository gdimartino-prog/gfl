name: Draft Clock

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:        # Allow manual trigger

# Lives in its own workflow file (not crons.yml) so that the */5 schedule
# always dispatches a run where the draft-clock job actually executes.
# When multiple schedules share one workflow, only the job whose `if` matches
# the firing schedule runs — which caused draft-clock to be silently skipped.

jobs:
  draft-clock:
    runs-on: ubuntu-latest
    steps:
      - name: Check draft clock and auto-skip expired picks
        run: |
          curl -s -X GET "https://afl.gddevco.com/api/cron/draft" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            | cat
